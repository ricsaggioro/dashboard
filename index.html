<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&family=Inter:wght@300;400;500&family=Geist+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0c;
  --surface: #000000;
  --surface2: #000000;
  --border: #222;
  --border2: #2e2e2e;
  --text: #e2e2e2;
  --text2: #b4b4b4;
  --text3: #a0a0a0;
  --accent: #d4ff6b;
  --accent2: #6bd4ff;
  --danger: #e05555;
  --warn: #e09944;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --radius: 10px;
  --pad: 28px;
  --gap: 16px;
  --task-size: 14px;
  --meta-size: 11px;
  --clock-hm-size: 80px;
  --clock-s-size: 40px;
  --date-size: 13px;
  --widget-pad: 22px;
  --header-size: 10px;
  --col-right-width: 33.333%;
  --task-line-height: 1.35;
  --card-radius: 9px;
  --card-gap: 6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  display:grid;
  grid-template-rows:1fr;
  height:100vh;
}

/* ── LAYOUT ── */
#layout{
  display:grid;
  grid-template-columns:1fr var(--col-right-width);
  height:100vh;
  overflow:hidden;
}

/* left = two task columns */
#left{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:0;
  border-right:1px solid var(--border);
  overflow:hidden;
}

/* right = clock + weather stacked */
#right{
  display:flex;
  flex-direction:column;
  overflow:hidden;
}

/* ── COLUMN SHARED ── */
.col{
  display:flex;
  flex-direction:column;
  overflow:hidden;
  padding:var(--pad);
}
.col + .col{
  border-left:1px solid var(--border);
}

.col-header{
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  margin-bottom:20px;
  flex-shrink:0;
}
.col-title{
  font-size:var(--header-size);
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text3);
}

/* ── TASK LIST ── */
.task-list{
  overflow-y:auto;
  flex:1;
  display:flex;
  flex-direction:column;
  gap:var(--card-gap);
  scrollbar-width:none;
}
.task-list::-webkit-scrollbar{display:none;}

.task-card{
  padding:12px 14px;
  border:1px solid var(--border);
  border-radius:var(--card-radius);
  display:flex;
  align-items:flex-start;
  gap:11px;
  animation:fadeUp 0.25s ease both;
}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(6px);}
  to{opacity:1;transform:translateY(0);}
}

.task-dot{
  width:6px;height:6px;
  border-radius:50%;
  flex-shrink:0;
  margin-top:5px;
}
.dot-todo{background:var(--text3);}
.dot-inprogress{background:var(--accent2);}

.task-body{flex:1;min-width:0;}
.task-name{
  font-size:var(--task-size);
  font-weight:400;
  color:var(--text);
  line-height:var(--task-line-height);
  margin-bottom:4px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.task-due{
  font-size:var(--meta-size);
  font-family:var(--mono);
  color:var(--text2);
  display:flex;
  align-items:center;
  gap:5px;
}
.due-overdue{color:var(--danger);}
.due-today{color:var(--warn);}
.due-soon{color:var(--accent2);}
.due-normal{color:var(--text2);}

/* event card: slightly different accent */
.event-card .dot-todo{background:#555;}
.event-card .dot-inprogress{background:var(--accent);}

/* ── EMPTY STATE ── */
.empty-state{
  color:var(--text3);
  font-size:12px;
  font-family:var(--mono);
  padding-top:8px;
}

/* ── RIGHT COLUMN ── */
.widget{
  padding:var(--widget-pad);
  flex:1;
  display:flex;
  flex-direction:column;
  overflow:hidden;
}
.widget+.widget{
  border-top:1px solid var(--border);
}
.widget-label{
  font-size:var(--header-size);
  font-weight:500;
  letter-spacing:0.12em;
  text-transform:uppercase;
  color:var(--text3);
  margin-bottom:18px;
  flex-shrink:0;
}

/* CLOCK */
#clock-row{
  display:flex;
  align-items:baseline;
  gap:0;
  line-height:1;
  margin-bottom:8px;
}
#clock-hm{
  font-family:var(--mono);
  font-size:var(--clock-hm-size);
  font-weight:300;
  color:var(--text);
  letter-spacing:-3px;
}
#clock-sep{
  font-family:var(--mono);
  font-size:var(--clock-hm-size);
  font-weight:300;
  color:var(--text3);
  letter-spacing:-3px;
}
#clock-s{
  font-family:var(--mono);
  font-size:var(--clock-s-size);
  font-weight:300;
  color:var(--text3);
  letter-spacing:-1px;
  margin-left:4px;
  align-self:flex-end;
  margin-bottom:6px;
}
#date-line{
  font-family:var(--mono);
  font-size:var(--date-size);
  color:var(--text2);
  letter-spacing:0.02em;
}

/* WEATHER */
#clock-widget{ flex:0 0 auto; }
#weather-widget{
  flex:1;
  gap:0;
}
#weather-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  margin-bottom:16px;
  flex-shrink:0;
}
#weather-temp-block{}
#weather-temp{
  font-family:var(--mono);
  font-size:52px;
  font-weight:300;
  color:var(--text);
  line-height:1;
}
#weather-desc{
  font-size:12px;
  color:var(--text2);
  margin-top:5px;
  text-transform:capitalize;
}
#weather-icon{
  opacity:0.8;
  flex-shrink:0;
}
#weather-stats{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  flex-shrink:0;
  margin-bottom:16px;
}
.w-stat{
  background:var(--surface2);
  border-radius:7px;
  padding:9px 11px;
}
.w-stat-label{
  font-size:9px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-family:var(--mono);
  margin-bottom:2px;
}
.w-stat-val{
  font-size:15px;
  font-weight:400;
  font-family:var(--mono);
  color:var(--text);
}

/* UV CHART */
#uv-section{
  flex:1;
  display:flex;
  flex-direction:column;
  min-height:0;
  margin-top:4px;
}
#uv-label{
  font-size:9px;
  color:var(--text3);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-family:var(--mono);
  margin-bottom:8px;
  flex-shrink:0;
}
#uv-chart-wrap{
  flex:1;
  min-height:0;
  position:relative;
}
#uv-chart{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
}

/* ── SYNC DOT ── */
#sync-indicator{
  position:fixed;
  bottom:16px;
  right:16px;
  display:flex;
  align-items:center;
  gap:5px;
  font-size:10px;
  font-family:var(--mono);
  color:var(--text3);
  z-index:50;
}
#sync-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--accent);
  animation:blink 2.5s infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0.2;}}
#sync-dot.error{background:var(--danger);animation:none;}

/* ── SETTINGS ── */
#settings-btn{
  position:fixed;
  top:14px;right:14px;
  z-index:90;
  background:none;
  border:1px solid var(--border2);
  color:var(--text3);
  font-size:11px;
  font-family:var(--font);
  padding:5px 11px;
  border-radius:6px;
  cursor:pointer;
  transition:color 0.15s,border-color 0.15s;
}
#settings-btn:hover{color:var(--text2);border-color:#444;}

#settings-overlay{
  display:none;
  position:fixed;inset:0;
  background:rgba(0,0,0,0.82);
  z-index:200;
  align-items:center;
  justify-content:center;
}
#settings-overlay.open{display:flex;}

#settings-box{
  background:#161616;
  border:1px solid #2a2a2a;
  border-radius:14px;
  padding:30px;
  width:600px;
  max-height:86vh;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:#333 transparent;
}
#settings-box h2{
  font-size:14px;font-weight:500;
  color:var(--text);margin-bottom:26px;
  letter-spacing:0.02em;
}
.s-section{
  font-size:9px;
  text-transform:uppercase;
  letter-spacing:0.12em;
  color:var(--text3);
  padding-bottom:8px;
  border-bottom:1px solid #1e1e1e;
  margin-bottom:16px;
  margin-top:24px;
}
.s-section:first-of-type{margin-top:0;}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.s-grid.s-grid-3{grid-template-columns:1fr 1fr 1fr;}
.s-row{margin-bottom:12px;}
.s-label{
  display:block;
  font-size:10px;
  color:var(--text2);
  margin-bottom:5px;
  font-family:var(--mono);
}
.s-row input[type=text],
.s-row input[type=color],
.s-row select{
  width:100%;
  background:#0e0e0e;
  border:1px solid #2a2a2a;
  border-radius:6px;
  color:var(--text);
  font-family:var(--mono);
  font-size:12px;
  padding:7px 10px;
  outline:none;
}
.s-row input[type=color]{height:36px;padding:3px 6px;cursor:pointer;}
.s-row input[type=range]{width:100%;accent-color:var(--accent);margin-top:2px;}
.range-row{display:flex;align-items:center;gap:8px;}
.range-row input{flex:1;}
.range-val{font-size:11px;color:var(--accent);font-family:var(--mono);min-width:36px;text-align:right;}
.s-actions{display:flex;gap:10px;margin-top:26px;}
.btn-save{
  flex:1;background:var(--accent);color:#000;
  border:none;border-radius:7px;
  padding:10px;font-family:var(--font);
  font-weight:500;font-size:13px;cursor:pointer;
}
.btn-close{
  background:none;border:1px solid #333;
  color:var(--text2);border-radius:7px;
  padding:10px 20px;font-family:var(--font);
  font-size:13px;cursor:pointer;
}
</style>
</head>
<body>

<button id="settings-btn" onclick="openSettings()">Customize</button>

<div id="layout">

  <!-- LEFT: two task columns -->
  <div id="left">

    <!-- TASKS column -->
    <div class="col" id="col-tasks">
      <div class="col-header">
        <span class="col-title" id="tasks-col-title">Tasks</span>
      </div>
      <div class="task-list" id="task-list-main">
        <div class="empty-state" id="tasks-empty" style="display:none">No tasks</div>
      </div>
    </div>

    <!-- COMING UP column -->
    <div class="col" id="col-events">
      <div class="col-header">
        <span class="col-title" id="events-col-title">Coming up</span>
      </div>
      <div class="task-list" id="task-list-events">
        <div class="empty-state" id="events-empty" style="display:none">Nothing coming up</div>
      </div>
    </div>

  </div><!-- /left -->

  <!-- RIGHT: clock + weather -->
  <div id="right">

    <!-- CLOCK -->
    <div class="widget" id="clock-widget">
      <div class="widget-label" id="clock-label">Time</div>
      <div id="clock-row">
        <span id="clock-hm">00:00</span>
        <span id="clock-sep"></span>
        <span id="clock-s">:00</span>
      </div>
      <div id="date-line">—</div>
    </div>

    <!-- WEATHER -->
    <div class="widget" id="weather-widget">
      <div class="widget-label" id="weather-label">Vergato · Weather</div>
      <div id="weather-top">
        <div id="weather-temp-block">
          <div id="weather-temp">—°</div>
          <div id="weather-desc">Loading…</div>
        </div>
        <div id="weather-icon"></div>
      </div>
      <div id="weather-stats">
        <div class="w-stat">
          <div class="w-stat-label">Feels like</div>
          <div class="w-stat-val" id="w-feels">—°</div>
        </div>
        <div class="w-stat">
          <div class="w-stat-label">Humidity</div>
          <div class="w-stat-val" id="w-hum">—%</div>
        </div>
        <div class="w-stat">
          <div class="w-stat-label">Wind</div>
          <div class="w-stat-val" id="w-wind">— km/h</div>
        </div>
        <div class="w-stat">
          <div class="w-stat-label">Precipitation</div>
          <div class="w-stat-val" id="w-precip">— mm</div>
        </div>
      </div>
      <div id="uv-section">
        <div id="uv-label">UV Index · Today</div>
        <div id="uv-chart-wrap">
          <canvas id="uv-chart"></canvas>
        </div>
      </div>
    </div>

  </div><!-- /right -->
</div><!-- /layout -->

<!-- SYNC -->
<div id="sync-indicator">
  <span id="sync-dot"></span>
  <span id="sync-text">—</span>
</div>

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>Customize Dashboard</h2>

    <div class="s-actions" style="margin-top:0;margin-bottom:26px;">
      <button class="btn-close" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Apply</button>
    </div>

    <div class="s-section">Notion</div>
    <div class="s-row">
      <label class="s-label">Cloudflare Worker URL</label>
      <input type="text" id="s-worker" placeholder="https://your-worker.workers.dev">
    </div>

    <div class="s-section">Colors</div>
    <div class="s-grid s-grid-3">
      <div class="s-row"><label class="s-label">Background</label><input type="color" id="s-bg"></div>
      <div class="s-row"><label class="s-label">Surface</label><input type="color" id="s-surface"></div>
      <div class="s-row"><label class="s-label">Surface 2</label><input type="color" id="s-surface2"></div>
      <div class="s-row"><label class="s-label">Text</label><input type="color" id="s-text"></div>
      <div class="s-row"><label class="s-label">Muted text</label><input type="color" id="s-text2"></div>
      <div class="s-row"><label class="s-label">Faint text</label><input type="color" id="s-text3"></div>
      <div class="s-row"><label class="s-label">Accent (green)</label><input type="color" id="s-accent"></div>
      <div class="s-row"><label class="s-label">Accent 2 (blue)</label><input type="color" id="s-accent2"></div>
      <div class="s-row"><label class="s-label">Border</label><input type="color" id="s-border"></div>
    </div>

    <div class="s-section">Typography</div>
    <div class="s-grid">
      <div class="s-row">
        <label class="s-label">Main font</label>
        <select id="s-font">
          <option value="'DM Sans', sans-serif">DM Sans</option>
          <option value="'Inter', sans-serif">Inter</option>
          <option value="system-ui, sans-serif">System UI</option>
          <option value="Georgia, serif">Georgia</option>
        </select>
      </div>
      <div class="s-row">
        <label class="s-label">Mono font</label>
        <select id="s-mono">
          <option value="'DM Mono', monospace">DM Mono</option>
          <option value="'Geist Mono', monospace">Geist Mono</option>
          <option value="'Courier New', monospace">Courier New</option>
          <option value="monospace">System Mono</option>
        </select>
      </div>
    </div>

    <div class="s-section">Font Sizes</div>
    <div class="s-grid">
      <div class="s-row">
        <label class="s-label">Task name <span class="range-val" id="rv-task">14px</span></label>
        <div class="range-row"><input type="range" id="s-task-size" min="10" max="22" step="1" oninput="rv('rv-task',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Task meta <span class="range-val" id="rv-meta">11px</span></label>
        <div class="range-row"><input type="range" id="s-meta-size" min="8" max="16" step="1" oninput="rv('rv-meta',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Clock H:M <span class="range-val" id="rv-clockhm">80px</span></label>
        <div class="range-row"><input type="range" id="s-clockhm" min="36" max="120" step="2" oninput="rv('rv-clockhm',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Clock sec <span class="range-val" id="rv-clocks">40px</span></label>
        <div class="range-row"><input type="range" id="s-clocks" min="18" max="80" step="2" oninput="rv('rv-clocks',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Date <span class="range-val" id="rv-date">13px</span></label>
        <div class="range-row"><input type="range" id="s-date-size" min="9" max="20" step="1" oninput="rv('rv-date',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Headers <span class="range-val" id="rv-header">10px</span></label>
        <div class="range-row"><input type="range" id="s-header-size" min="8" max="16" step="1" oninput="rv('rv-header',this,'px')"></div>
      </div>
    </div>

    <div class="s-section">Layout & Spacing</div>
    <div class="s-grid">
      <div class="s-row">
        <label class="s-label">Right panel width <span class="range-val" id="rv-rw">33%</span></label>
        <div class="range-row"><input type="range" id="s-rw" min="20" max="50" step="1" oninput="rv('rv-rw',this,'%')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Outer padding <span class="range-val" id="rv-pad">28px</span></label>
        <div class="range-row"><input type="range" id="s-pad" min="10" max="52" step="2" oninput="rv('rv-pad',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Card gap <span class="range-val" id="rv-cgap">6px</span></label>
        <div class="range-row"><input type="range" id="s-cgap" min="2" max="20" step="1" oninput="rv('rv-cgap',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Card radius <span class="range-val" id="rv-cr">9px</span></label>
        <div class="range-row"><input type="range" id="s-cr" min="0" max="20" step="1" oninput="rv('rv-cr',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Widget padding <span class="range-val" id="rv-wp">22px</span></label>
        <div class="range-row"><input type="range" id="s-wp" min="10" max="48" step="2" oninput="rv('rv-wp',this,'px')"></div>
      </div>
      <div class="s-row">
        <label class="s-label">Task line height <span class="range-val" id="rv-lh">1.35</span></label>
        <div class="range-row"><input type="range" id="s-lh" min="1" max="2" step="0.05" oninput="rv('rv-lh',this,'')"></div>
      </div>
    </div>

    <div class="s-section">Labels</div>
    <div class="s-grid">
      <div class="s-row"><label class="s-label">Tasks column title</label><input type="text" id="s-tasks-title" value="Tasks"></div>
      <div class="s-row"><label class="s-label">Events column title</label><input type="text" id="s-events-title" value="Coming up"></div>
      <div class="s-row"><label class="s-label">Clock label</label><input type="text" id="s-clock-label" value="Time"></div>
      <div class="s-row"><label class="s-label">Weather label</label><input type="text" id="s-weather-label" value="Vergato · Weather"></div>
    </div>

    <div class="s-actions">
      <button class="btn-close" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Apply</button>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────
const DEFAULTS = {
  workerUrl:'',
  bg:'#0c0c0c', surface:'#141414', surface2:'#1c1c1c',
  border:'#222',
  text:'#e2e2e2', text2:'#888', text3:'#444',
  accent:'#d4ff6b', accent2:'#6bd4ff',
  font:"'DM Sans', sans-serif", mono:"'DM Mono', monospace",
  taskSize:14, metaSize:11, clockHm:80, clockS:40,
  dateSize:13, headerSize:10,
  rw:33, pad:28, cgap:6, cr:9, wp:22, lh:1.35,
  tasksTitle:'Tasks', eventsTitle:'Coming up',
  clockLabel:'Time', weatherLabel:'Vergato · Weather',
};

function loadCfg(){
  try{ return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem('db_cfg')||'{}')); }
  catch(e){ return {...DEFAULTS}; }
}
function saveCfg(c){ localStorage.setItem('db_cfg', JSON.stringify(c)); }

let CFG = loadCfg();

function applyCfg(c){
  const r = document.documentElement.style;
  r.setProperty('--bg', c.bg);
  r.setProperty('--surface', c.surface);
  r.setProperty('--surface2', c.surface2);
  r.setProperty('--border', c.border);
  r.setProperty('--text', c.text);
  r.setProperty('--text2', c.text2);
  r.setProperty('--text3', c.text3);
  r.setProperty('--accent', c.accent);
  r.setProperty('--accent2', c.accent2);
  r.setProperty('--font', c.font);
  r.setProperty('--mono', c.mono);

// ─── WEATHER ──────────────────────────────────────────
// Vergato (BO): 44.2833° N, 11.1167° E
const WMO = {
  0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Fog',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
  80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Hail storm'
};
// SVG weather icons — minimal line style
function weatherSVG(code){
  const s = (inner, vb='0 0 40 40') =>
    `<svg viewBox="${vb}" width="38" height="38" fill="none" stroke="#666" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">${inner}</svg>`;

  // sun rays + circle
  const sun = `<circle cx="20" cy="20" r="6"/>
    <line x1="20" y1="4" x2="20" y2="9"/><line x1="20" y1="31" x2="20" y2="36"/>
    <line x1="4" y1="20" x2="9" y2="20"/><line x1="31" y1="20" x2="36" y2="20"/>
    <line x1="8.5" y1="8.5" x2="12" y2="12"/><line x1="28" y1="28" x2="31.5" y2="31.5"/>
    <line x1="31.5" y1="8.5" x2="28" y2="12"/><line x1="12" y1="28" x2="8.5" y2="31.5"/>`;

  // cloud shape
  const cloud = `<path d="M10 28 Q6 28 6 23 Q6 18 11 18 Q11 13 16 13 Q20 13 21 16 Q25 14 28 17 Q32 17 32 22 Q32 28 28 28 Z"/>`;

  // small cloud
  const cloudSm = `<path d="M14 28 Q11 28 11 25 Q11 21 15 21 Q15 17 19 17 Q22 17 23 19 Q26 18 28 21 Q31 21 31 25 Q31 28 28 28 Z"/>`;

  // sun + cloud
  const sunCloud = `<circle cx="12" cy="14" r="5"/>
    <line x1="12" y1="4" x2="12" y2="7"/><line x1="4" y1="14" x2="7" y2="14"/>
    <line x1="5.5" y1="7.5" x2="7.5" y2="9.5"/><line x1="16.5" y1="7.5" x2="18" y2="6"/>
    ${cloudSm}`;

  // rain drops
  const drops = `<line x1="16" y1="31" x2="14" y2="36"/><line x1="22" y1="31" x2="20" y2="36"/><line x1="28" y1="31" x2="26" y2="36"/>`;

  // snow dots
  const snow = `<circle cx="16" cy="33" r="1.2" fill="#666" stroke="none"/>
    <circle cx="22" cy="35" r="1.2" fill="#666" stroke="none"/>
    <circle cx="28" cy="33" r="1.2" fill="#666" stroke="none"/>`;

  // fog lines
  const fog = `<line x1="8" y1="18" x2="32" y2="18"/><line x1="11" y1="23" x2="32" y2="23"/><line x1="8" y1="28" x2="28" y2="28"/>`;

  // lightning
  const bolt = `<polyline points="24,12 18,22 22,22 16,34"/>`;

  // group by condition
  if(code===0)                        return s(sun);
  if(code===1)                        return s(sun);
  if(code===2)                        return s(sunCloud);
  if(code===3)                        return s(cloud);
  if(code===45||code===48)            return s(fog);
  if(code>=51&&code<=55)              return s(cloudSm+drops);
  if(code>=61&&code<=65)              return s(cloud+drops);
  if(code>=71&&code<=75)              return s(cloud+snow);
  if(code>=80&&code<=82)              return s(sunCloud+drops);
  if(code===95||code===96)            return s(cloud+drops+bolt);
  return s(cloud);
}

async function fetchWeather(){
  try{
    const url='https://api.open-meteo.com/v1/forecast'
      +'?latitude=44.2833&longitude=11.1167'
      +'&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,precipitation'
      +'&hourly=uv_index'

    const d = await (await fetch(url)).json();

    document.getElementById('weather-icon').innerHTML = weatherSVG(c.weather_code);
    document.getElementById('w-feels').textContent  = Math.round(c.apparent_temperature)+'°';
    document.getElementById('w-hum').textContent    = Math.round(c.relative_humidity_2m)+'%';

  }
}

function drawUV(uvArr, timeArr){
  const canvas = document.getElementById('uv-chart');
  const wrap = document.getElementById('uv-chart-wrap');
  const W = wrap.clientWidth || 200;
  const H = wrap.clientHeight || 120;
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  // only show 6am–10pm
  const now = new Date();
  const indices = timeArr.reduce((acc,t,i)=>{
    const h = new Date(t).getHours();
    if(h>=6 && h<=22) acc.push(i);
    return acc;
  },[]);
  if(!indices.length) return;

  const vals = indices.map(i=>uvArr[i]||0);
  const labels = indices.map(i=>new Date(timeArr[i]).getHours());
  const max = Math.max(...vals, 1);
  const nowH = now.getHours();

  const monoFont = getComputedStyle(document.documentElement).getPropertyValue('--mono').trim() || 'monospace';
  const pd = {l:4, r:4, t:22, b:22};
  const chartW = W - pd.l - pd.r;
  const chartH = H - pd.t - pd.b;
  const step = chartW / Math.max(vals.length - 1, 1);

  ctx.clearRect(0,0,W,H);

  // horizontal guide lines
  ctx.strokeStyle='rgba(255,255,255,0.04)';
  ctx.lineWidth=0.8;
  [0.25,0.5,0.75,1].forEach(f=>{
    const y = pd.t + chartH*(1-f);
    ctx.beginPath(); ctx.moveTo(pd.l,y); ctx.lineTo(pd.l+chartW,y); ctx.stroke();
  });

  // area fill under curve
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const x=pd.l+i*step, y=pd.t+chartH-(v/max)*chartH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.lineTo(pd.l+(vals.length-1)*step, pd.t+chartH);
  ctx.lineTo(pd.l, pd.t+chartH);
  ctx.closePath();
  ctx.fillStyle='rgba(200,200,200,0.06)';
  ctx.fill();

  // line
  ctx.beginPath();
  vals.forEach((v,i)=>{
    const x=pd.l+i*step, y=pd.t+chartH-(v/max)*chartH;
    i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#505050';
  ctx.lineWidth=1.5;
  ctx.stroke();

  // hour labels every 3h
  ctx.fillStyle='#404040';
  ctx.font=`10px ${monoFont}`;
  ctx.textAlign='center';
  labels.forEach((h,i)=>{
    if(h%3===0){
      ctx.fillText(h+'h', pd.l+i*step, H-5);
    }
  });

  // current hour marker + value
  const ci = labels.indexOf(nowH);
  if(ci>=0){
    const cx=pd.l+ci*step, cy=pd.t+chartH-(vals[ci]/max)*chartH;
    // vertical dashed line
    ctx.setLineDash([3,3]);
    ctx.strokeStyle='rgba(255,255,255,0.12)';
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx, pd.t+chartH); ctx.lineTo(cx, cy); ctx.stroke();
    ctx.setLineDash([]);
    // dot
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2);
    ctx.fillStyle='#999'; ctx.fill();
    // label above
    ctx.fillStyle='#aaa';
    ctx.font=`500 11px ${monoFont}`;
    ctx.textAlign='center';
    ctx.fillText('UV '+Math.round(vals[ci]), cx, cy-10);
  }
}

// ─── TASKS ────────────────────────────────────────────
const EVENT_TAGS = ['appointments','events','birthdays','appointment','event','birthday'];
let allTasks = [];
let syncTimer = null;

function statusKey(s){
  if(!s) return 'todo';
  const v = s.toLowerCase().replace(/\s/g,'');
  if(v.includes('progress')||v.includes('doing')) return 'inprogress';
  if(v.includes('done')||v.includes('complete')||v.includes('finished')) return 'done';
  return 'todo';
}

function isEvent(task){
  return (task.tags||[]).some(t=>EVENT_TAGS.includes(t.toLowerCase()));
}

function dueInfo(task){
  if(!task.due) return null;
  // Parse date+time
  const dateStr = task.due; // e.g. "2025-06-10" or "2025-06-10T14:00:00.000+02:00"
  const due = new Date(dateStr);
  const hasTime = dateStr.includes('T') && !dateStr.endsWith('T00:00:00.000Z');

  const today = new Date();
  today.setHours(0,0,0,0);
  const dueMidnight = new Date(due);
  dueMidnight.setHours(0,0,0,0);

  const diffDays = Math.round((dueMidnight - today)/(1000*60*60*24));

  let cls='due-normal', label='';
  if(diffDays < 0){
    cls='due-overdue';
    label = diffDays===-1 ? 'Yesterday' : due.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  } else if(diffDays===0){
    cls='due-today'; label='Today';
  } else if(diffDays===1){
    cls='due-soon'; label='Tomorrow';
  } else if(diffDays<=5){
    cls='due-soon'; label='In '+diffDays+'d';
  } else {
    cls='due-normal';
    label=due.toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  }

  let timeLabel='';
  if(hasTime){
    timeLabel = due.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }

  return {cls, label, timeLabel, ts: due.getTime()};
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function makeCard(task, isEv){
  const sk = statusKey(task.status);
  const dotCls = sk==='inprogress' ? 'dot-inprogress' : 'dot-todo';
  const due = dueInfo(task);

  const card = document.createElement('div');
  card.className = 'task-card' + (isEv?' event-card':'');

  let dueHtml='';
  if(due){
    dueHtml = `<div class="task-due ${due.cls}">${esc(due.label)}${due.timeLabel?' · '+esc(due.timeLabel):''}</div>`;
  }

  card.innerHTML = `
    <span class="task-dot ${dotCls}"></span>
    <div class="task-body">
      <div class="task-name">${esc(task.name)}</div>
      ${dueHtml}
    </div>`;
  return card;
}

function renderAll(tasks){
  const active = tasks.filter(t=>statusKey(t.status)!=='done');
  const mainTasks = active.filter(t=>!isEvent(t));
  const events    = active.filter(t=>isEvent(t));

  const sortByDue = arr=>[...arr].sort((a,b)=>{
    const da=a.due?new Date(a.due).getTime():9e12;
    const db=b.due?new Date(b.due).getTime():9e12;
    return da-db;
  });

  renderList('task-list-main', 'tasks-empty', sortByDue(mainTasks), false);
  renderList('task-list-events','events-empty', sortByDue(events), true);
}

function renderList(listId, emptyId, items, isEv){
  const list  = document.getElementById(listId);
  const empty = document.getElementById(emptyId);
  // remove old cards
  [...list.querySelectorAll('.task-card')].forEach(c=>c.remove());
  if(!items.length){ empty.style.display='block'; return; }
  empty.style.display='none';
  items.forEach((t,i)=>{
    const card = makeCard(t,isEv);
    card.style.animationDelay = (i*30)+'ms';
    list.appendChild(card);
  });
}

function setSyncStatus(ok, msg){
  document.getElementById('sync-dot').className = ok?'':'error';
  document.getElementById('sync-text').textContent = msg;
}

async function fetchTasks(){
  if(!CFG.workerUrl){ renderAll(demo()); setSyncStatus(false,'Demo'); return; }
  try{
    setSyncStatus(true,'Syncing…');
    const res = await fetch(CFG.workerUrl);
    if(!res.ok) throw new Error('HTTP '+res.status);
    const data = await res.json();
    allTasks = data.tasks||[];
    renderAll(allTasks);
    const t=new Date();
    setSyncStatus(true,'Synced '+pad(t.getHours())+':'+pad(t.getMinutes()));
  }catch(e){
    setSyncStatus(false,'Error: '+e.message);
    if(allTasks.length) renderAll(allTasks);
    else renderAll(demo());
  }
}

function startSync(){
  if(syncTimer) clearInterval(syncTimer);
  fetchTasks();
  syncTimer = setInterval(fetchTasks, 30000);
}

function demo(){
  const d=(n)=>{const x=new Date();x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];};
  const dt=(n,h,m)=>{const x=new Date();x.setDate(x.getDate()+n);x.setHours(h,m,0,0);return x.toISOString();};
  return [
    {name:'Configure Cloudflare Worker',status:'In progress',due:d(0),tags:[]},
    {name:'Connect Notion database',status:'To Do',due:d(1),tags:[]},
    {name:'Deploy to GitHub Pages',status:'To Do',due:d(3),tags:[]},
    {name:'Review project proposal',status:'To Do',due:d(5),tags:[]},
    {name:'Doctor appointment',status:'To Do',due:dt(2,10,30),tags:['Appointments']},
    {name:'Maria birthday',status:'To Do',due:d(4),tags:['Birthdays']},
    {name:'Team lunch',status:'In progress',due:dt(1,12,0),tags:['Events']},
    {name:'Overdue example',status:'To Do',due:d(-3),tags:[]},
  ];
}

// ─── INIT ─────────────────────────────────────────────
applyCfg(CFG);
startSync();
