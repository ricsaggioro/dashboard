<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#000; --surface:#0a0a0a; --surface2:#111;
  --border:#1e1e1e; --border2:#2a2a2a;
  --text:#fff; --text2:#bbb; --text3:#666;
  --accent:#d4ff6b; --accent2:#6bd4ff;
  --danger:#e05555; --warn:#e09944;
  --font:'DM Sans',sans-serif; --mono:'DM Mono',monospace;
  --task-size:14px; --meta-size:11px;
  --clock-hm-size:80px; --clock-s-size:40px;
  --date-size:13px; --header-size:10px;
  --col-right-width:33.333%;
  --pad:28px; --gap:16px; --card-gap:6px; --card-radius:9px;
  --widget-pad:22px; --task-lh:1.35;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:var(--font);}

/* ── TOP BUTTONS ── */
#top-btns{position:fixed;top:14px;right:14px;z-index:90;display:flex;gap:6px;}
.top-btn{
  background:none;border:1px solid var(--border2);color:var(--text3);
  font-size:11px;font-family:var(--font);padding:5px 13px;border-radius:6px;
  cursor:pointer;transition:color .15s,border-color .15s,background .15s;
}
.top-btn:hover{color:var(--text2);border-color:#444;}
.top-btn.active{color:var(--text);border-color:#555;background:var(--surface2);}

/* ── HOME LAYOUT ── */
#view-home{
  display:grid;
  grid-template-columns:1fr var(--col-right-width);
  height:100vh;overflow:hidden;
}
#left{display:grid;grid-template-columns:1fr 1fr;border-right:1px solid var(--border);overflow:hidden;}
#right{display:flex;flex-direction:column;overflow:hidden;}

/* ── VISITOR LAYOUT ── */
#view-visitor{
  display:none;
  height:100vh;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  gap:40px;
}

/* ── COLUMN ── */
.col{display:flex;flex-direction:column;overflow:hidden;padding:var(--pad);}
.col+.col{border-left:1px solid var(--border);}
.col-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:20px;flex-shrink:0;}
.col-title{font-size:var(--header-size);font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);}

/* ── TASK LIST ── */
.task-list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:var(--card-gap);scrollbar-width:none;}
.task-list::-webkit-scrollbar{display:none;}
.task-card{
  padding:12px 14px;border:1px solid var(--border);border-radius:var(--card-radius);
  display:flex;align-items:flex-start;gap:11px;
  animation:fadeUp .25s ease both;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.task-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.dot-todo{background:var(--text3);}
.dot-inprogress{background:var(--accent2);}
.task-body{flex:1;min-width:0;}
.task-name{font-size:var(--task-size);font-weight:400;color:var(--text);line-height:var(--task-lh);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.task-due{font-size:var(--meta-size);font-family:var(--mono);color:var(--text2);}
.due-overdue{color:var(--danger);}
.due-today{color:var(--warn);}
.due-soon{color:var(--accent2);}
.due-normal{color:var(--text2);}
.event-card .dot-inprogress{background:var(--accent);}
.empty-state{color:var(--text3);font-size:12px;font-family:var(--mono);padding-top:8px;}

/* ── WIDGET (home right panel) ── */
.widget{padding:var(--widget-pad);display:flex;flex-direction:column;overflow:hidden;}
#clock-widget{flex:0 0 auto;}
#weather-widget{flex:1;}
.widget+.widget{border-top:1px solid var(--border);}
.widget-label{font-size:var(--header-size);font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:18px;flex-shrink:0;}

/* ── CLOCK (home) ── */
#clock-row{display:flex;align-items:baseline;line-height:1;margin-bottom:8px;}
#clock-hm{font-family:var(--mono);font-size:var(--clock-hm-size);font-weight:300;color:var(--text);letter-spacing:-3px;}
#clock-s{font-family:var(--mono);font-size:var(--clock-s-size);font-weight:300;color:var(--text3);letter-spacing:-1px;margin-left:4px;align-self:flex-end;margin-bottom:6px;}
#date-line{font-family:var(--mono);font-size:var(--date-size);color:var(--text2);}

/* ── CLOCK (visitor, big centered) ── */
#v-clock-wrap{text-align:center;}
#v-clock-hm{font-family:var(--mono);font-size:120px;font-weight:300;color:var(--text);letter-spacing:-6px;line-height:1;}
#v-clock-s{font-family:var(--mono);font-size:56px;font-weight:300;color:var(--text3);letter-spacing:-2px;margin-left:8px;vertical-align:baseline;}
#v-date-line{font-family:var(--mono);font-size:18px;color:var(--text2);margin-top:10px;letter-spacing:.02em;}

/* ── WEATHER (home) ── */
#weather-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px;flex-shrink:0;}
#weather-temp{font-family:var(--mono);font-size:52px;font-weight:300;color:var(--text);line-height:1;}
#weather-desc{font-size:12px;color:var(--text2);margin-top:5px;text-transform:capitalize;}
#weather-icon{opacity:.8;flex-shrink:0;}
#weather-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;flex-shrink:0;margin-bottom:16px;}
.w-stat{background:var(--surface2);border-radius:7px;padding:9px 11px;}
.w-stat-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:2px;}
.w-stat-val{font-size:15px;font-weight:400;font-family:var(--mono);color:var(--text);}
#uv-section{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:4px;}
#uv-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--mono);margin-bottom:8px;flex-shrink:0;}
#uv-chart-wrap{flex:1;min-height:0;position:relative;}
#uv-chart{position:absolute;inset:0;width:100%;height:100%;}

/* ── WEATHER (visitor, compact card) ── */
#v-weather-wrap{
  display:flex;align-items:center;gap:32px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:28px 36px;
}
#v-weather-temp{font-family:var(--mono);font-size:72px;font-weight:300;color:var(--text);line-height:1;}
#v-weather-right{}
#v-weather-desc{font-size:16px;color:var(--text2);margin-bottom:14px;text-transform:capitalize;}
#v-weather-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.v-stat-label{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
.v-stat-val{font-size:15px;font-family:var(--mono);color:var(--text);margin-top:2px;}
#v-weather-icon{opacity:.8;}

/* ── SYNC ── */
#sync-indicator{position:fixed;bottom:16px;right:16px;display:flex;align-items:center;gap:5px;font-size:10px;font-family:var(--mono);color:var(--text3);z-index:50;}
#sync-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:blink 2.5s infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
#sync-dot.error{background:var(--danger);animation:none;}

/* ── SETTINGS OVERLAY ── */
#settings-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:200;align-items:center;justify-content:center;}
#settings-overlay.open{display:flex;}
#settings-box{background:#161616;border:1px solid #2a2a2a;border-radius:14px;padding:30px;width:600px;max-height:86vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:#333 transparent;}
#settings-box h2{font-size:14px;font-weight:500;color:var(--text);margin-bottom:20px;}
.s-actions-top{display:flex;gap:10px;margin-bottom:26px;}
.s-section{font-size:9px;text-transform:uppercase;letter-spacing:.12em;color:var(--text3);padding-bottom:8px;border-bottom:1px solid #1e1e1e;margin-bottom:16px;margin-top:24px;}
.s-section:first-of-type{margin-top:0;}
.s-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.s-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.s-row{margin-bottom:12px;}
.s-label{display:block;font-size:10px;color:var(--text2);margin-bottom:5px;font-family:var(--mono);}
.s-row input[type=text],.s-row input[type=color],.s-row select{width:100%;background:#0e0e0e;border:1px solid #2a2a2a;border-radius:6px;color:var(--text);font-family:var(--mono);font-size:12px;padding:7px 10px;outline:none;}
.s-row input[type=color]{height:36px;padding:3px 6px;cursor:pointer;}
.s-row input[type=range]{width:100%;accent-color:var(--accent);margin-top:2px;}
.range-row{display:flex;align-items:center;gap:8px;}
.range-row input{flex:1;}
.rv{font-size:11px;color:var(--accent);font-family:var(--mono);min-width:36px;text-align:right;}
.btn-save{flex:1;background:var(--accent);color:#000;border:none;border-radius:7px;padding:10px;font-family:var(--font);font-weight:500;font-size:13px;cursor:pointer;}
.btn-close{background:none;border:1px solid #333;color:var(--text2);border-radius:7px;padding:10px 20px;font-family:var(--font);font-size:13px;cursor:pointer;}
</style>
</head>
<body>

<!-- TOP BUTTONS -->
<div id="top-btns">
  <button class="top-btn active" id="btn-home"    onclick="switchView('home')">Home</button>
  <button class="top-btn"        id="btn-visitor" onclick="switchView('visitor')">Visitor</button>
  <button class="top-btn"        id="btn-customize" onclick="openSettings()">Customize</button>
</div>

<!-- ══ HOME VIEW ══════════════════════════════════════════════════════════════ -->
<div id="view-home">

  <div id="left">
    <!-- Tasks -->
    <div class="col">
      <div class="col-header"><span class="col-title" id="lbl-tasks">Tasks</span></div>
      <div class="task-list" id="list-tasks">
        <div class="empty-state" id="empty-tasks" style="display:none">No tasks</div>
      </div>
    </div>
    <!-- Coming up -->
    <div class="col">
      <div class="col-header"><span class="col-title" id="lbl-events">Coming up</span></div>
      <div class="task-list" id="list-events">
        <div class="empty-state" id="empty-events" style="display:none">Nothing coming up</div>
      </div>
    </div>
  </div>

  <div id="right">
    <!-- Clock -->
    <div class="widget" id="clock-widget">
      <div class="widget-label" id="lbl-clock">Time</div>
      <div id="clock-row">
        <span id="clock-hm">00:00</span>
        <span id="clock-s">:00</span>
      </div>
      <div id="date-line"></div>
    </div>
    <!-- Weather -->
    <div class="widget" id="weather-widget">
      <div class="widget-label" id="lbl-weather">Vergato &middot; Weather</div>
      <div id="weather-top">
        <div>
          <div id="weather-temp">&#x2014;&deg;</div>
          <div id="weather-desc">Loading&hellip;</div>
        </div>
        <div id="weather-icon"></div>
      </div>
      <div id="weather-stats">
        <div class="w-stat"><div class="w-stat-label">Feels like</div><div class="w-stat-val" id="w-feels">&#x2014;</div></div>
        <div class="w-stat"><div class="w-stat-label">Humidity</div><div class="w-stat-val" id="w-hum">&#x2014;</div></div>
        <div class="w-stat"><div class="w-stat-label">Wind</div><div class="w-stat-val" id="w-wind">&#x2014;</div></div>
        <div class="w-stat"><div class="w-stat-label">Precipitation</div><div class="w-stat-val" id="w-precip">&#x2014;</div></div>
      </div>
      <div id="uv-section">
        <div id="uv-label">UV Index &middot; Today</div>
        <div id="uv-chart-wrap"><canvas id="uv-chart"></canvas></div>
      </div>
    </div>
  </div>

</div><!-- /view-home -->

<!-- ══ VISITOR VIEW ═══════════════════════════════════════════════════════════ -->
<div id="view-visitor">

  <div id="v-clock-wrap">
    <div>
      <span id="v-clock-hm">00:00</span><span id="v-clock-s">:00</span>
    </div>
    <div id="v-date-line"></div>
  </div>

  <div id="v-weather-wrap">
    <div>
      <div id="v-weather-temp">&#x2014;&deg;</div>
    </div>
    <div id="v-weather-icon"></div>
    <div id="v-weather-right">
      <div id="v-weather-desc">Loading&hellip;</div>
      <div id="v-weather-stats">
        <div>
          <div class="v-stat-label">Feels like</div>
          <div class="v-stat-val" id="vw-feels">&#x2014;</div>
        </div>
        <div>
          <div class="v-stat-label">Humidity</div>
          <div class="v-stat-val" id="vw-hum">&#x2014;</div>
        </div>
        <div>
          <div class="v-stat-label">Wind</div>
          <div class="v-stat-val" id="vw-wind">&#x2014;</div>
        </div>
        <div>
          <div class="v-stat-label">Precipitation</div>
          <div class="v-stat-val" id="vw-precip">&#x2014;</div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /view-visitor -->

<!-- SYNC -->
<div id="sync-indicator">
  <span id="sync-dot"></span>
  <span id="sync-text"></span>
</div>

<!-- SETTINGS -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>Customize Dashboard</h2>
    <div class="s-actions-top">
      <button class="btn-close" onclick="closeSettings()">Cancel</button>
      <button class="btn-save"  onclick="saveSettings()">Apply</button>
    </div>

    <div class="s-section">Notion</div>
    <div class="s-row"><label class="s-label">Cloudflare Worker URL</label><input type="text" id="s-worker" placeholder="https://your-worker.workers.dev"></div>

    <div class="s-section">Colors</div>
    <div class="s-grid3">
      <div class="s-row"><label class="s-label">Background</label><input type="color" id="s-bg"></div>
      <div class="s-row"><label class="s-label">Surface</label><input type="color" id="s-surface"></div>
      <div class="s-row"><label class="s-label">Surface 2</label><input type="color" id="s-surface2"></div>
      <div class="s-row"><label class="s-label">Text</label><input type="color" id="s-text"></div>
      <div class="s-row"><label class="s-label">Muted text</label><input type="color" id="s-text2"></div>
      <div class="s-row"><label class="s-label">Faint text</label><input type="color" id="s-text3"></div>
      <div class="s-row"><label class="s-label">Accent</label><input type="color" id="s-accent"></div>
      <div class="s-row"><label class="s-label">Accent 2</label><input type="color" id="s-accent2"></div>
      <div class="s-row"><label class="s-label">Border</label><input type="color" id="s-border"></div>
    </div>

    <div class="s-section">Typography</div>
    <div class="s-grid">
      <div class="s-row"><label class="s-label">Main font</label>
        <select id="s-font">
          <option value="'DM Sans',sans-serif">DM Sans</option>
          <option value="'Inter',sans-serif">Inter</option>
          <option value="system-ui,sans-serif">System UI</option>
          <option value="Georgia,serif">Georgia</option>
        </select>
      </div>
      <div class="s-row"><label class="s-label">Mono font</label>
        <select id="s-mono">
          <option value="'DM Mono',monospace">DM Mono</option>
          <option value="'Courier New',monospace">Courier New</option>
          <option value="monospace">System Mono</option>
        </select>
      </div>
    </div>

    <div class="s-section">Font Sizes</div>
    <div class="s-grid">
      <div class="s-row"><label class="s-label">Task name <span class="rv" id="rv-task">14px</span></label><div class="range-row"><input type="range" id="s-task-size" min="10" max="22" step="1" oninput="rvUpd('rv-task',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Task meta <span class="rv" id="rv-meta">11px</span></label><div class="range-row"><input type="range" id="s-meta-size" min="8" max="16" step="1" oninput="rvUpd('rv-meta',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Clock H:M <span class="rv" id="rv-clockhm">80px</span></label><div class="range-row"><input type="range" id="s-clockhm" min="36" max="120" step="2" oninput="rvUpd('rv-clockhm',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Clock sec <span class="rv" id="rv-clocks">40px</span></label><div class="range-row"><input type="range" id="s-clocks" min="18" max="80" step="2" oninput="rvUpd('rv-clocks',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Date <span class="rv" id="rv-date">13px</span></label><div class="range-row"><input type="range" id="s-date-size" min="9" max="20" step="1" oninput="rvUpd('rv-date',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Headers <span class="rv" id="rv-hdr">10px</span></label><div class="range-row"><input type="range" id="s-hdr-size" min="8" max="16" step="1" oninput="rvUpd('rv-hdr',this,'px')"></div></div>
    </div>

    <div class="s-section">Layout</div>
    <div class="s-grid">
      <div class="s-row"><label class="s-label">Right panel % <span class="rv" id="rv-rw">33%</span></label><div class="range-row"><input type="range" id="s-rw" min="20" max="50" step="1" oninput="rvUpd('rv-rw',this,'%')"></div></div>
      <div class="s-row"><label class="s-label">Padding <span class="rv" id="rv-pad">28px</span></label><div class="range-row"><input type="range" id="s-pad" min="10" max="52" step="2" oninput="rvUpd('rv-pad',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Card gap <span class="rv" id="rv-cgap">6px</span></label><div class="range-row"><input type="range" id="s-cgap" min="2" max="20" step="1" oninput="rvUpd('rv-cgap',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Card radius <span class="rv" id="rv-cr">9px</span></label><div class="range-row"><input type="range" id="s-cr" min="0" max="20" step="1" oninput="rvUpd('rv-cr',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Widget pad <span class="rv" id="rv-wp">22px</span></label><div class="range-row"><input type="range" id="s-wp" min="10" max="48" step="2" oninput="rvUpd('rv-wp',this,'px')"></div></div>
      <div class="s-row"><label class="s-label">Line height <span class="rv" id="rv-lh">1.35</span></label><div class="range-row"><input type="range" id="s-lh" min="1" max="2" step="0.05" oninput="rvUpd('rv-lh',this,'')"></div></div>
    </div>

    <div class="s-section">Labels</div>
    <div class="s-grid">
      <div class="s-row"><label class="s-label">Tasks column</label><input type="text" id="s-lbl-tasks" value="Tasks"></div>
      <div class="s-row"><label class="s-label">Events column</label><input type="text" id="s-lbl-events" value="Coming up"></div>
      <div class="s-row"><label class="s-label">Clock label</label><input type="text" id="s-lbl-clock" value="Time"></div>
      <div class="s-row"><label class="s-label">Weather label</label><input type="text" id="s-lbl-weather" value="Vergato · Weather"></div>
    </div>
  </div>
</div>

<script>
// ── DEFAULTS ──────────────────────────────────────────────────────────────────
var D = {
  workerUrl:'',
  bg:'#000000', surface:'#0a0a0a', surface2:'#111111', border:'#1e1e1e',
  text:'#ffffff', text2:'#bbbbbb', text3:'#666666',
  accent:'#d4ff6b', accent2:'#6bd4ff',
  font:"'DM Sans',sans-serif", mono:"'DM Mono',monospace",
  taskSize:14, metaSize:11, clockHm:80, clockS:40, dateSize:13, hdrSize:10,
  rw:33, pad:28, cgap:6, cr:9, wp:22, lh:1.35,
  lblTasks:'Tasks', lblEvents:'Coming up', lblClock:'Time', lblWeather:'Vergato \u00b7 Weather'
};

function loadCfg() {
  try { return Object.assign({}, D, JSON.parse(localStorage.getItem('db_cfg') || '{}')); }
  catch(e) { return Object.assign({}, D); }
}
function saveCfg(c) { try { localStorage.setItem('db_cfg', JSON.stringify(c)); } catch(e) {} }

var CFG = loadCfg();

function el(id) { return document.getElementById(id); }

function applyCfg(c) {
  var r = document.documentElement.style;
  r.setProperty('--bg',            c.bg);
  r.setProperty('--surface',       c.surface);
  r.setProperty('--surface2',      c.surface2);
  r.setProperty('--border',        c.border);
  r.setProperty('--text',          c.text);
  r.setProperty('--text2',         c.text2);
  r.setProperty('--text3',         c.text3);
  r.setProperty('--accent',        c.accent);
  r.setProperty('--accent2',       c.accent2);
  r.setProperty('--font',          c.font);
  r.setProperty('--mono',          c.mono);
  r.setProperty('--task-size',     c.taskSize  + 'px');
  r.setProperty('--meta-size',     c.metaSize  + 'px');
  r.setProperty('--clock-hm-size', c.clockHm   + 'px');
  r.setProperty('--clock-s-size',  c.clockS    + 'px');
  r.setProperty('--date-size',     c.dateSize  + 'px');
  r.setProperty('--header-size',   c.hdrSize   + 'px');
  r.setProperty('--col-right-width', c.rw      + '%');
  r.setProperty('--pad',           c.pad  + 'px');
  r.setProperty('--card-gap',      c.cgap + 'px');
  r.setProperty('--card-radius',   c.cr   + 'px');
  r.setProperty('--widget-pad',    c.wp   + 'px');
  r.setProperty('--task-lh',       String(c.lh));
  var e;
  e = el('lbl-tasks');   if(e) e.textContent = c.lblTasks;
  e = el('lbl-events');  if(e) e.textContent = c.lblEvents;

}

// ── SETTINGS UI ───────────────────────────────────────────────────────────────
function rvUpd(id, input, unit) {
  var v = parseFloat(input.value);
  var d = el(id); if(d) d.textContent = (v % 1 === 0 ? v : parseFloat(v.toFixed(2))) + unit;
}
function sset(id, v)  { var e = el(id); if(e) e.value = v; }
function srng(id, rvId, v, unit) {
  sset(id, v);
  var lv = parseFloat(v), d = el(rvId);
  if(d) d.textContent = (lv % 1 === 0 ? lv : parseFloat(lv.toFixed(2))) + unit;
}
function gv(id)  { var e = el(id); return e ? e.value : ''; }
function gn(id)  { return parseInt(gv(id))   || 0; }
function gf(id)  { return parseFloat(gv(id)) || 0; }

function openSettings() {
  var c = CFG;
  sset('s-worker', c.workerUrl);
  sset('s-bg', c.bg); sset('s-surface', c.surface); sset('s-surface2', c.surface2);
  sset('s-border', c.border);
  sset('s-text', c.text); sset('s-text2', c.text2); sset('s-text3', c.text3);
  sset('s-accent', c.accent); sset('s-accent2', c.accent2);
  sset('s-font', c.font); sset('s-mono', c.mono);
  srng('s-task-size','rv-task',   c.taskSize,'px');
  srng('s-meta-size','rv-meta',   c.metaSize,'px');
  srng('s-clockhm',  'rv-clockhm',c.clockHm,'px');
  srng('s-clocks',   'rv-clocks', c.clockS,'px');
  srng('s-date-size','rv-date',   c.dateSize,'px');
  srng('s-hdr-size', 'rv-hdr',   c.hdrSize,'px');
  srng('s-rw',  'rv-rw',  c.rw,'%');
  srng('s-pad', 'rv-pad', c.pad,'px');
  srng('s-cgap','rv-cgap',c.cgap,'px');
  srng('s-cr',  'rv-cr',  c.cr,'px');
  srng('s-wp',  'rv-wp',  c.wp,'px');
  srng('s-lh',  'rv-lh',  c.lh,'');
  sset('s-lbl-tasks',   c.lblTasks);
  sset('s-lbl-events',  c.lblEvents);
  sset('s-lbl-clock',   c.lblClock);
  sset('s-lbl-weather', c.lblWeather);
  var ov = el('settings-overlay'); if(ov) ov.classList.add('open');
}
function closeSettings() { var ov = el('settings-overlay'); if(ov) ov.classList.remove('open'); }
function saveSettings() {
  CFG = {
    workerUrl: gv('s-worker'),
    bg:gv('s-bg'), surface:gv('s-surface'), surface2:gv('s-surface2'), border:gv('s-border'),
    text:gv('s-text'), text2:gv('s-text2'), text3:gv('s-text3'),
    accent:gv('s-accent'), accent2:gv('s-accent2'),
    font:gv('s-font'), mono:gv('s-mono'),
    taskSize:gn('s-task-size'), metaSize:gn('s-meta-size'),
    clockHm:gn('s-clockhm'), clockS:gn('s-clocks'),
    dateSize:gn('s-date-size'), hdrSize:gn('s-hdr-size'),
    rw:gn('s-rw'), pad:gn('s-pad'), cgap:gn('s-cgap'),
    cr:gn('s-cr'), wp:gn('s-wp'), lh:gf('s-lh'),
    lblTasks:   gv('s-lbl-tasks')   || 'Tasks',
    lblEvents:  gv('s-lbl-events')  || 'Coming up',
    lblClock:   gv('s-lbl-clock')   || 'Time',
    lblWeather: gv('s-lbl-weather') || 'Weather'
  };
  saveCfg(CFG); applyCfg(CFG); closeSettings(); startSync();
}

// ── VIEW SWITCHING ────────────────────────────────────────────────────────────
var currentView = 'home';

// ── CLOCK ─────────────────────────────────────────────────────────────────────
function pad2(n) { return String(n).padStart(2,'0'); }

function tick() {
  var n = new Date();
  var hm = pad2(n.getHours()) + ':' + pad2(n.getMinutes());
  var ss = ':' + pad2(n.getSeconds());
  var dl = n.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  // home
  var e;
  e = el('clock-hm'); if(e) e.textContent = hm;
  e = el('clock-s');  if(e) e.textContent = ss;
  e = el('date-line'); if(e) e.textContent = dl;
  // visitor
  e = el('v-clock-hm'); if(e) e.textContent = hm;
  e = el('v-clock-s');  if(e) e.textContent = ss;
  e = el('v-date-line'); if(e) e.textContent = dl;
}
setInterval(tick, 1000);
tick();

// ── WEATHER ───────────────────────────────────────────────────────────────────
var WMO = {
  0:'Clear',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',
  45:'Fog',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',
  61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',
  80:'Light showers',81:'Showers',82:'Heavy showers',95:'Thunderstorm',96:'Hail storm'
};

function weatherSVG(code) {
  var K = '#777', W = '1.6';
  function svg(body) {
    return '<svg viewBox="0 0 40 40" width="38" height="38" fill="none" stroke="'+K+'" stroke-width="'+W+'" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">'+body+'</svg>';
  }
  var sun     = '<circle cx="20" cy="20" r="6"/><line x1="20" y1="4" x2="20" y2="9"/><line x1="20" y1="31" x2="20" y2="36"/><line x1="4" y1="20" x2="9" y2="20"/><line x1="31" y1="20" x2="36" y2="20"/><line x1="8.5" y1="8.5" x2="12" y2="12"/><line x1="28" y1="28" x2="31.5" y2="31.5"/><line x1="31.5" y1="8.5" x2="28" y2="12"/><line x1="12" y1="28" x2="8.5" y2="31.5"/>';
  var cloud   = '<path d="M10 28 Q6 28 6 23 Q6 18 11 18 Q11 13 16 13 Q20 13 21 16 Q25 14 28 17 Q32 17 32 22 Q32 28 28 28 Z"/>';
  var cloudSm = '<path d="M14 28 Q11 28 11 25 Q11 21 15 21 Q15 17 19 17 Q22 17 23 19 Q26 18 28 21 Q31 21 31 25 Q31 28 28 28 Z"/>';
  var sunSm   = '<circle cx="12" cy="14" r="5"/><line x1="12" y1="4" x2="12" y2="7"/><line x1="4" y1="14" x2="7" y2="14"/><line x1="5.5" y1="7.5" x2="7.5" y2="9.5"/>';
  var drops   = '<line x1="16" y1="31" x2="14" y2="36"/><line x1="22" y1="31" x2="20" y2="36"/><line x1="28" y1="31" x2="26" y2="36"/>';
  var snow    = '<circle cx="16" cy="33" r="1.2" fill="#777" stroke="none"/><circle cx="22" cy="35" r="1.2" fill="#777" stroke="none"/><circle cx="28" cy="33" r="1.2" fill="#777" stroke="none"/>';
  var fog     = '<line x1="8" y1="18" x2="32" y2="18"/><line x1="11" y1="23" x2="32" y2="23"/><line x1="8" y1="28" x2="28" y2="28"/>';
  var bolt    = '<polyline points="24,12 18,22 22,22 16,34"/>';
  if(code===0||code===1)           return svg(sun);
  if(code===2)                     return svg(sunSm+cloudSm);
  if(code===3)                     return svg(cloud);
  if(code===45||code===48)         return svg(fog);
  if(code>=51&&code<=55)           return svg(cloudSm+drops);
  if(code>=61&&code<=65)           return svg(cloud+drops);
  if(code>=71&&code<=75)           return svg(cloud+snow);
  if(code>=80&&code<=82)           return svg(sunSm+cloudSm+drops);
  if(code===95||code===96)         return svg(cloud+drops+bolt);
  return svg(cloud);
}

var lastWeather = null;
var lastUVData  = null;

function syncVisitorWeather() {
  if(!lastWeather) return;
  var w = lastWeather;
  var e;
  e = el('v-weather-temp'); if(e) e.textContent = w.temp;
  e = el('v-weather-desc'); if(e) e.textContent = w.desc;
  e = el('v-weather-icon'); if(e) e.innerHTML   = w.iconSVG;
  e = el('vw-feels');  if(e) e.textContent = w.feels;
  e = el('vw-hum');    if(e) e.textContent = w.hum;
  e = el('vw-wind');   if(e) e.textContent = w.wind;
  e = el('vw-precip'); if(e) e.textContent = w.precip;
}

function fetchWeather() {
  var url = 'https://api.open-meteo.com/v1/forecast'
    + '?latitude=44.2833&longitude=11.1167'
    + '&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,precipitation'
    + '&hourly=uv_index&wind_speed_unit=kmh&forecast_days=1';
  fetch(url)
    .then(function(res) { return res.json(); })
    .then(function(d) {
      var c    = d.current;
      var code = c.weather_code;
      var w = {
        temp:    Math.round(c.temperature_2m) + '\u00b0',
        desc:    WMO[code] || '',
        iconSVG: weatherSVG(code),
        feels:   Math.round(c.apparent_temperature) + '\u00b0',
        hum:     Math.round(c.relative_humidity_2m) + '%',
        wind:    Math.round(c.wind_speed_10m) + ' km/h',
        precip:  (c.precipitation || 0).toFixed(1) + ' mm'
      };
      lastWeather = w;
      // home panel
      var e;
      e = el('weather-temp'); if(e) e.textContent = w.temp;
      e = el('weather-desc'); if(e) e.textContent = w.desc;
      e = el('weather-icon'); if(e) e.innerHTML   = w.iconSVG;
      e = el('w-feels');  if(e) e.textContent = w.feels;
      e = el('w-hum');    if(e) e.textContent = w.hum;
      e = el('w-wind');   if(e) e.textContent = w.wind;
      e = el('w-precip'); if(e) e.textContent = w.precip;
      // visitor panel
      syncVisitorWeather();
      // UV chart
      if(d.hourly && d.hourly.uv_index) {
        lastUVData = {uv: d.hourly.uv_index, times: d.hourly.time};
        drawUV();
      }
    })
    .catch(function() {
      var e = el('weather-desc'); if(e) e.textContent = 'Unavailable';
    });
}

fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

// ── UV CHART ──────────────────────────────────────────────────────────────────
function drawUV() {
  if(!lastUVData) return;
  var canvas = el('uv-chart');
  var wrap   = el('uv-chart-wrap');
  if(!canvas || !wrap) return;
  var W = wrap.clientWidth || 200, H = wrap.clientHeight || 120;
  canvas.width = W; canvas.height = H;
  var ctx = canvas.getContext('2d');
  var uvArr   = lastUVData.uv;
  var timeArr = lastUVData.times;
  var nowH    = new Date().getHours();
  var mono    = "'DM Mono',monospace";

  var idx = [], i;
  for(i = 0; i < timeArr.length; i++) {
    if(new Date(timeArr[i]).getHours() >= 6 && new Date(timeArr[i]).getHours() <= 22) idx.push(i);
  }
  if(!idx.length) return;
  var vals   = idx.map(function(i) { return uvArr[i] || 0; });
  var labels = idx.map(function(i) { return new Date(timeArr[i]).getHours(); });
  var max    = Math.max.apply(null, vals.concat([1]));
  var n      = vals.length;
  var pd     = {l:4,r:4,t:22,b:22};
  var cW     = W - pd.l - pd.r, cH = H - pd.t - pd.b;
  var step   = n > 1 ? cW / (n - 1) : cW;

  ctx.clearRect(0, 0, W, H);

  // guide lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.8;
  [0.25,0.5,0.75,1].forEach(function(f) {
    var y = pd.t + cH*(1-f);
    ctx.beginPath(); ctx.moveTo(pd.l,y); ctx.lineTo(pd.l+cW,y); ctx.stroke();
  });

  // area fill
  ctx.beginPath();
  for(i=0;i<n;i++){var x=pd.l+i*step,y=pd.t+cH-(vals[i]/max)*cH; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);}
  ctx.lineTo(pd.l+(n-1)*step,pd.t+cH); ctx.lineTo(pd.l,pd.t+cH); ctx.closePath();
  ctx.fillStyle='rgba(200,200,200,0.06)'; ctx.fill();

  // line
  ctx.beginPath();
  for(i=0;i<n;i++){var x=pd.l+i*step,y=pd.t+cH-(vals[i]/max)*cH; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);}
  ctx.strokeStyle='#505050'; ctx.lineWidth=1.5; ctx.stroke();

  // hour labels
  ctx.fillStyle='#404040'; ctx.font='10px '+mono; ctx.textAlign='center';
  for(i=0;i<n;i++) { if(labels[i]%3===0) ctx.fillText(labels[i]+'h', pd.l+i*step, H-5); }

  // current hour dot + label
  var ci = labels.indexOf(nowH);
  if(ci >= 0) {
    var cx=pd.l+ci*step, cy=pd.t+cH-(vals[ci]/max)*cH;
    ctx.setLineDash([3,3]); ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(cx,pd.t+cH); ctx.lineTo(cx,cy); ctx.stroke();
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.arc(cx,cy,4,0,Math.PI*2); ctx.fillStyle='#999'; ctx.fill();
    ctx.fillStyle='#aaa'; ctx.font='500 11px '+mono; ctx.textAlign='center';
    ctx.fillText('UV '+Math.round(vals[ci]), cx, cy-10);
  }
}

if(window.ResizeObserver) {
  var uvWrap = el('uv-chart-wrap');
  if(uvWrap) new ResizeObserver(drawUV).observe(uvWrap);
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
var EVENT_TAGS = ['appointments','events','birthdays','appointment','event','birthday'];
var allTasks   = [];
var syncTimer  = null;

function statusKey(s) {
  if(!s) return 'todo';
  var v = s.toLowerCase().replace(/\s/g,'');
  if(v.indexOf('progress') >= 0 || v.indexOf('doing') >= 0) return 'inprogress';
  if(v.indexOf('done') >= 0 || v.indexOf('complete') >= 0)  return 'done';
  return 'todo';
}

function isEvent(task) {
  var tags = task.tags || [], i;
  for(i = 0; i < tags.length; i++) {
    if(EVENT_TAGS.indexOf(tags[i].toLowerCase()) >= 0) return true;
  }
  return false;
}

function todayMidnight() {
  var t = new Date(); t.setHours(0,0,0,0); return t;
}

function dueInfo(task) {
  if(!task.due) return null;
  var due     = new Date(task.due);
  var hasTime = task.due.indexOf('T') >= 0 && task.due.indexOf('00:00:00') < 0;
  // compare calendar dates only — recalculate fresh each call so it stays accurate overnight
  var today    = todayMidnight();
  var dueMid   = new Date(due); dueMid.setHours(0,0,0,0);
  var diffDays = Math.round((dueMid.getTime() - today.getTime()) / 86400000);
  var cls, label;
  if(diffDays < 0)       { cls = 'due-overdue'; label = diffDays === -1 ? 'Yesterday' : due.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  else if(diffDays === 0){ cls = 'due-today';   label = 'Today'; }
  else if(diffDays === 1){ cls = 'due-soon';    label = 'Tomorrow'; }
  else if(diffDays <= 5) { cls = 'due-soon';    label = 'In ' + diffDays + 'd'; }
  else                   { cls = 'due-normal';  label = due.toLocaleDateString('en-GB',{day:'numeric',month:'short'}); }
  var timeLabel = '';
  if(hasTime) timeLabel = due.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  return {cls:cls, label:label, timeLabel:timeLabel};
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function taskKey(t) { return (t.name||'')+'|'+(t.due||'')+'|'+(t.status||''); }

function makeCard(task, isEv) {
  var sk   = statusKey(task.status);
  var dot  = sk === 'inprogress' ? 'dot-inprogress' : 'dot-todo';
  var due  = dueInfo(task);
  var card = document.createElement('div');
  card.className       = 'task-card' + (isEv ? ' event-card' : '');
  card.dataset.key     = taskKey(task);
  var dueHtml = '';
  if(due) dueHtml = '<div class="task-due '+due.cls+'">'+esc(due.label)+(due.timeLabel?' \u00b7 '+esc(due.timeLabel):'')+'</div>';
  card.innerHTML = '<span class="task-dot '+dot+'"></span><div class="task-body"><div class="task-name">'+esc(task.name)+'</div>'+dueHtml+'</div>';
  return card;
}

function renderList(listId, emptyId, items, isEv) {
  var list  = el(listId), empty = el(emptyId);
  if(!list) return;
  if(!items.length) {
    var old = list.querySelectorAll('.task-card');
    for(var i=0;i<old.length;i++) old[i].remove();
    if(empty) empty.style.display = 'block';
    return;
  }
  if(empty) empty.style.display = 'none';

  // build key map of existing nodes
  var existing = {}, prev = list.querySelectorAll('.task-card'), i;
  for(i=0;i<prev.length;i++) existing[prev[i].dataset.key] = prev[i];

  // remove stale
  var newKeys = items.map(taskKey);
  Object.keys(existing).forEach(function(k){ if(newKeys.indexOf(k)<0) existing[k].remove(); });

  // insert / reorder
  for(i=0;i<items.length;i++) {
    var key  = taskKey(items[i]);
    var node = existing[key];
    var ref  = list.querySelectorAll('.task-card')[i] || null;
    if(!node) {
      list.insertBefore(makeCard(items[i], isEv), ref);
    } else {
      var cur = list.querySelectorAll('.task-card'), pos = -1, j;
      for(j=0;j<cur.length;j++) { if(cur[j]===node){pos=j;break;} }
      if(pos !== i) list.insertBefore(node, ref);
    }
  }
}

// Refresh due-date labels on existing cards every minute (no full re-render needed)
function refreshDueLabels() {
  var cards = document.querySelectorAll('.task-card');
  cards.forEach(function(card) {
    var key    = card.dataset.key || '';
    var parts  = key.split('|');
    var dueStr = parts[1] || '';
    if(!dueStr) return;
    var dueEl = card.querySelector('.task-due');
    if(!dueEl) return;
    var info = dueInfo({due: dueStr});
    if(!info) return;
    dueEl.className = 'task-due ' + info.cls;
    dueEl.textContent = info.label + (info.timeLabel ? ' \u00b7 ' + info.timeLabel : '');
  });
}
setInterval(refreshDueLabels, 60 * 1000);

function sortByDue(arr) {
  return arr.slice().sort(function(a,b) {
    var da = a.due ? new Date(a.due).getTime() : 9e12;
    var db = b.due ? new Date(b.due).getTime() : 9e12;
    return da - db;
  });
}

function renderAll(tasks) {
  var active = tasks.filter(function(t) { return statusKey(t.status) !== 'done'; });
  renderList('list-tasks',  'empty-tasks',  sortByDue(active.filter(function(t){return !isEvent(t);})), false);
  renderList('list-events', 'empty-events', sortByDue(active.filter(function(t){return  isEvent(t);})), true);
}

function setSyncStatus(ok, msg) {
  var dot = el('sync-dot'), txt = el('sync-text');
  if(dot) dot.className  = ok ? '' : 'error';
  if(txt) txt.textContent = msg;
}

function fetchTasks() {
  if(!CFG.workerUrl) { renderAll(demo()); setSyncStatus(false,'Demo'); return; }
  setSyncStatus(true,'Syncing\u2026');
  fetch(CFG.workerUrl)
    .then(function(res){ if(!res.ok) throw new Error('HTTP '+res.status); return res.json(); })
    .then(function(data){
      allTasks = data.tasks || [];
      renderAll(allTasks);
      var t = new Date();
      setSyncStatus(true,'Synced '+pad2(t.getHours())+':'+pad2(t.getMinutes()));
    })
    .catch(function(e){
      setSyncStatus(false,'Error: '+e.message);
      renderAll(allTasks.length ? allTasks : demo());
    });
}

function startSync() {
  if(syncTimer) clearInterval(syncTimer);
  fetchTasks();
  syncTimer = setInterval(fetchTasks, 30000);
}

function demo() {
  function d(n){var x=new Date();x.setDate(x.getDate()+n);return x.toISOString().split('T')[0];}
  function dt(n,h,m){var x=new Date();x.setDate(x.getDate()+n);x.setHours(h,m,0,0);return x.toISOString();}
  return [
    {name:'Configure Cloudflare Worker', status:'In progress', due:d(0),     tags:[]},
    {name:'Connect Notion database',     status:'To Do',       due:d(1),     tags:[]},
    {name:'Deploy to GitHub Pages',      status:'To Do',       due:d(3),     tags:[]},
    {name:'Review project proposal',     status:'To Do',       due:d(5),     tags:[]},
    {name:'Overdue task example',        status:'To Do',       due:d(-3),    tags:[]},
    {name:'Doctor appointment',          status:'To Do',       due:dt(2,10,30), tags:['Appointments']},
    {name:'Maria birthday',              status:'To Do',       due:d(4),     tags:['Birthdays']},
    {name:'Team lunch',                  status:'In progress', due:dt(1,12,0),  tags:['Events']}
  ];
}

// ── INIT ─────────────────────────────────────────────────────────────────────
applyCfg(CFG);
startSync();
</script>
