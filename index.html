<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #141414;
    --surface2: #1a1a1a;
    --border: #2a2a2a;
    --text: #e8e8e8;
    --muted: #666;
    --accent: #c8ff57;
    --accent2: #57c8ff;
    --danger: #ff6b6b;
    --warn: #ffb347;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 10px;
    --col-gap: 20px;
    --pad: 24px;
    --task-font-size: 15px;
    --header-font-size: 13px;
    --clock-size: 72px;
    --tag-radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ── TOP BAR ── */
  #topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px var(--pad);
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0;
  }
  #topbar-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  #sync-status {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #sync-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* ── MAIN LAYOUT ── */
  #main {
    display: grid;
    grid-template-columns: 1fr 340px;
    gap: var(--col-gap);
    padding: var(--pad);
    flex: 1;
    overflow: hidden;
    min-height: 0;
  }

  /* ── LEFT: TASKS ── */
  #tasks-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-height: 0;
  }
  #tasks-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  #tasks-title {
    font-size: var(--header-font-size);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
  }
  #task-count {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    padding: 3px 8px;
    border-radius: 20px;
  }

  #tasks-list {
    overflow-y: auto;
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding-right: 4px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .task-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    transition: border-color 0.2s;
    animation: slideIn 0.3s ease both;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .task-card:hover { border-color: #3a3a3a; }

  .status-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 5px;
  }
  .status-todo      { background: var(--muted); }
  .status-inprogress { background: var(--accent2); box-shadow: 0 0 6px var(--accent2); }
  .status-done      { background: var(--accent); }

  .task-body { flex: 1; min-width: 0; }
  .task-name {
    font-size: var(--task-font-size);
    font-weight: 400;
    color: var(--text);
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .task-name.done-task {
    text-decoration: line-through;
    color: var(--muted);
  }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 11px;
    font-family: var(--mono);
    padding: 2px 7px;
    border-radius: var(--tag-radius);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .due-date {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .due-date.overdue  { color: var(--danger); }
  .due-date.today    { color: var(--warn); }
  .due-date.soon     { color: var(--accent2); }

  /* ── RIGHT: WIDGETS ── */
  #right-panel {
    display: flex;
    flex-direction: column;
    gap: var(--col-gap);
    overflow-y: auto;
    scrollbar-width: none;
  }

  .widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .widget-label {
    font-size: var(--header-font-size);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 16px;
  }

  /* CLOCK */
  #clock-display {
    font-family: var(--mono);
    font-size: var(--clock-size);
    font-weight: 300;
    color: var(--text);
    letter-spacing: -2px;
    line-height: 1;
  }
  #date-display {
    font-size: 13px;
    color: var(--muted);
    margin-top: 8px;
    font-family: var(--mono);
  }

  /* WEATHER */
  #weather-main {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 16px;
  }
  #weather-temp {
    font-size: 48px;
    font-weight: 300;
    font-family: var(--mono);
    color: var(--text);
    line-height: 1;
  }
  #weather-icon {
    font-size: 42px;
    line-height: 1;
  }
  #weather-desc {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    text-transform: capitalize;
  }
  #weather-details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  .weather-stat {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
  }
  .weather-stat-label {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 3px;
  }
  .weather-stat-value {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--mono);
  }

  /* STATS BAR */
  #stats-bar {
    display: flex;
    gap: 8px;
    margin-bottom: var(--col-gap);
    flex-shrink: 0;
  }
  .stat-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 16px;
    flex: 1;
    text-align: center;
  }
  .stat-pill-val {
    font-size: 22px;
    font-family: var(--mono);
    font-weight: 400;
    line-height: 1;
    color: var(--text);
  }
  .stat-pill-label {
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-top: 4px;
  }
  .stat-pill.accent-pill .stat-pill-val { color: var(--accent); }
  .stat-pill.blue-pill .stat-pill-val   { color: var(--accent2); }

  /* EMPTY / ERROR */
  #tasks-empty {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    height: 100%;
    color: var(--muted);
    font-size: 14px;
  }

  /* ── SETTINGS PANEL ── */
  #settings-btn {
    cursor: pointer;
    background: none;
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 12px;
    font-family: var(--font);
    padding: 4px 12px;
    border-radius: 6px;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: border-color 0.2s, color 0.2s;
  }
  #settings-btn:hover { border-color: #555; color: var(--text); }

  #settings-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 100;
    align-items: center;
    justify-content: center;
  }
  #settings-overlay.open { display: flex; }

  #settings-box {
    background: #1a1a1a;
    border: 1px solid #333;
    border-radius: 14px;
    padding: 28px;
    width: 520px;
    max-height: 80vh;
    overflow-y: auto;
  }
  #settings-box h2 {
    font-size: 15px;
    font-weight: 500;
    color: var(--text);
    margin-bottom: 24px;
  }
  .setting-row {
    margin-bottom: 20px;
  }
  .setting-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 8px;
    display: block;
  }
  .setting-row input[type="text"],
  .setting-row input[type="color"],
  .setting-row select {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    border-radius: 7px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 13px;
    padding: 8px 12px;
    outline: none;
  }
  .setting-row input[type="color"] {
    height: 40px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .setting-row input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }
  .range-val {
    font-size: 12px;
    color: var(--accent);
    font-family: var(--mono);
    margin-left: 8px;
  }
  .color-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .settings-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn-save {
    flex: 1;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 7px;
    padding: 10px;
    font-family: var(--font);
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
  }
  .btn-close {
    background: none;
    border: 1px solid #333;
    color: var(--muted);
    border-radius: 7px;
    padding: 10px 20px;
    font-family: var(--font);
    font-size: 13px;
    cursor: pointer;
  }
  .settings-sep {
    border: none;
    border-top: 1px solid #2a2a2a;
    margin: 20px 0;
  }
  .setting-section-title {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #444;
    margin-bottom: 16px;
    padding-bottom: 6px;
    border-bottom: 1px solid #222;
  }

  /* NOTION CONFIG */
  #notion-config {
    display: flex;
    flex-direction: column;
    gap: 10px;
    padding: 14px;
    background: #111;
    border: 1px solid #2a2a2a;
    border-radius: 8px;
    margin-bottom: 16px;
  }
  #notion-config input {
    background: #0d0d0d;
    border: 1px solid #333;
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    width: 100%;
  }
  #notion-config label {
    font-size: 11px;
    color: var(--muted);
  }

  #error-banner {
    display: none;
    font-size: 12px;
    color: var(--danger);
    font-family: var(--mono);
    padding: 8px 12px;
    background: rgba(255,107,107,0.08);
    border: 1px solid rgba(255,107,107,0.2);
    border-radius: 6px;
    margin-bottom: 10px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <span id="topbar-title">My Dashboard</span>
  <div style="display:flex;align-items:center;gap:12px;">
    <div id="sync-status">
      <span id="sync-dot"></span>
      <span id="sync-text">Live</span>
    </div>
    <button id="settings-btn" onclick="openSettings()">
      ⚙ Customize
    </button>
  </div>
</div>

<!-- STATS BAR -->
<div style="padding: 0 var(--pad); padding-top: var(--pad); flex-shrink:0;">
  <div id="stats-bar">
    <div class="stat-pill">
      <div class="stat-pill-val" id="stat-total">—</div>
      <div class="stat-pill-label">Total</div>
    </div>
    <div class="stat-pill blue-pill">
      <div class="stat-pill-val" id="stat-inprogress">—</div>
      <div class="stat-pill-label">In Progress</div>
    </div>
    <div class="stat-pill">
      <div class="stat-pill-val" id="stat-todo">—</div>
      <div class="stat-pill-label">To Do</div>
    </div>
    <div class="stat-pill accent-pill">
      <div class="stat-pill-val" id="stat-done">—</div>
      <div class="stat-pill-label">Done</div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div id="main">

  <!-- TASKS -->
  <div id="tasks-panel">
    <div id="tasks-header">
      <span id="tasks-title">Tasks</span>
      <span id="task-count">Loading…</span>
    </div>
    <div id="error-banner"></div>
    <div id="tasks-list">
      <div id="tasks-empty">No tasks found</div>
    </div>
  </div>

  <!-- RIGHT WIDGETS -->
  <div id="right-panel">

    <!-- CLOCK -->
    <div class="widget">
      <div class="widget-label">Time</div>
      <div id="clock-display">00:00:00</div>
      <div id="date-display">—</div>
    </div>

    <!-- WEATHER -->
    <div class="widget">
      <div class="widget-label">Bologna · Weather</div>
      <div id="weather-main">
        <div>
          <div id="weather-temp">—°</div>
          <div id="weather-desc">Loading…</div>
        </div>
        <div id="weather-icon">⛅</div>
      </div>
      <div id="weather-details">
        <div class="weather-stat">
          <div class="weather-stat-label">Feels like</div>
          <div class="weather-stat-value" id="w-feels">—°</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Humidity</div>
          <div class="weather-stat-value" id="w-hum">—%</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">Wind</div>
          <div class="weather-stat-value" id="w-wind">— km/h</div>
        </div>
        <div class="weather-stat">
          <div class="weather-stat-label">UV Index</div>
          <div class="weather-stat-value" id="w-uv">—</div>
        </div>
      </div>
    </div>

  </div><!-- /right-panel -->
</div><!-- /main -->

<!-- SETTINGS OVERLAY -->
<div id="settings-overlay">
  <div id="settings-box">
    <h2>Customize Dashboard</h2>

    <div class="setting-section-title">Notion Connection</div>
    <div class="setting-row">
      <label class="setting-label">Cloudflare Worker URL</label>
      <input type="text" id="cfg-worker-url" placeholder="https://your-worker.workers.dev" />
    </div>

    <hr class="settings-sep">
    <div class="setting-section-title">Appearance</div>

    <div class="color-grid">
      <div class="setting-row">
        <label class="setting-label">Background</label>
        <input type="color" id="cfg-bg" value="#0d0d0d" />
      </div>
      <div class="setting-row">
        <label class="setting-label">Surface</label>
        <input type="color" id="cfg-surface" value="#141414" />
      </div>
      <div class="setting-row">
        <label class="setting-label">Text</label>
        <input type="color" id="cfg-text" value="#e8e8e8" />
      </div>
      <div class="setting-row">
        <label class="setting-label">Accent color</label>
        <input type="color" id="cfg-accent" value="#c8ff57" />
      </div>
    </div>

    <div class="setting-row">
      <label class="setting-label">Font</label>
      <select id="cfg-font">
        <option value="'DM Sans', sans-serif">DM Sans (default)</option>
        <option value="'DM Mono', monospace">DM Mono</option>
        <option value="'Georgia', serif">Georgia</option>
        <option value="system-ui, sans-serif">System UI</option>
      </select>
    </div>

    <div class="setting-row">
      <label class="setting-label">Task font size <span class="range-val" id="task-size-val">15px</span></label>
      <input type="range" id="cfg-task-size" min="12" max="22" value="15" oninput="document.getElementById('task-size-val').textContent=this.value+'px'" />
    </div>

    <div class="setting-row">
      <label class="setting-label">Clock size <span class="range-val" id="clock-size-val">72px</span></label>
      <input type="range" id="cfg-clock-size" min="36" max="100" value="72" oninput="document.getElementById('clock-size-val').textContent=this.value+'px'" />
    </div>

    <div class="setting-row">
      <label class="setting-label">Right panel width (px) <span class="range-val" id="rpanel-val">340px</span></label>
      <input type="range" id="cfg-rpanel" min="200" max="500" value="340" oninput="document.getElementById('rpanel-val').textContent=this.value+'px'" />
    </div>

    <div class="setting-row">
      <label class="setting-label">Dashboard title</label>
      <input type="text" id="cfg-title" value="My Dashboard" />
    </div>

    <div class="settings-actions">
      <button class="btn-close" onclick="closeSettings()">Cancel</button>
      <button class="btn-save" onclick="saveSettings()">Save & Apply</button>
    </div>
  </div>
</div>

<script>
// ──────────────────────────────────────────
// CONFIG — persisted in localStorage
// ──────────────────────────────────────────
const DEFAULTS = {
  workerUrl: '',
  bg: '#0d0d0d',
  surface: '#141414',
  text: '#e8e8e8',
  accent: '#c8ff57',
  font: "'DM Sans', sans-serif",
  taskSize: 15,
  clockSize: 72,
  rpanel: 340,
  title: 'My Dashboard'
};

function loadConfig() {
  try { return Object.assign({}, DEFAULTS, JSON.parse(localStorage.getItem('dashboard_cfg') || '{}')); }
  catch(e) { return {...DEFAULTS}; }
}

function saveConfig(cfg) {
  localStorage.setItem('dashboard_cfg', JSON.stringify(cfg));
}

let CFG = loadConfig();

function applyConfig(cfg) {
  const r = document.documentElement.style;
  r.setProperty('--bg', cfg.bg);
  r.setProperty('--surface', cfg.surface);
  r.setProperty('--surface2', adjustBrightness(cfg.surface, 10));
  r.setProperty('--text', cfg.text);
  r.setProperty('--accent', cfg.accent);
  r.setProperty('--font', cfg.font);
  r.setProperty('--task-font-size', cfg.taskSize + 'px');
  r.setProperty('--clock-size', cfg.clockSize + 'px');
  document.getElementById('main').style.gridTemplateColumns = `1fr ${cfg.rpanel}px`;
  document.getElementById('topbar-title').textContent = cfg.title;
}

function adjustBrightness(hex, amount) {
  const num = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (num >> 16) + amount);
  const g = Math.min(255, ((num >> 8) & 0xff) + amount);
  const b = Math.min(255, (num & 0xff) + amount);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// ──────────────────────────────────────────
// CLOCK
// ──────────────────────────────────────────
function tickClock() {
  const now = new Date();
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  const ss = String(now.getSeconds()).padStart(2,'0');
  document.getElementById('clock-display').textContent = `${hh}:${mm}:${ss}`;
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('date-display').textContent = now.toLocaleDateString('it-IT', opts);
}
setInterval(tickClock, 1000);
tickClock();

// ──────────────────────────────────────────
// WEATHER — Open-Meteo (no API key needed)
// Bologna: lat 44.4949, lon 11.3426
// ──────────────────────────────────────────
const WMO_CODES = {
  0:'Sereno', 1:'Prevalentemente sereno', 2:'Parzialmente nuvoloso', 3:'Coperto',
  45:'Nebbia', 48:'Nebbia ghiacciata', 51:'Pioviggine leggera', 53:'Pioviggine',
  55:'Pioviggine intensa', 61:'Pioggia leggera', 63:'Pioggia', 65:'Pioggia intensa',
  71:'Neve leggera', 73:'Neve', 75:'Neve intensa', 80:'Rovesci leggeri',
  81:'Rovesci', 82:'Rovesci intensi', 95:'Temporale', 96:'Temporale con grandine'
};
const WMO_ICONS = {
  0:'☀️', 1:'🌤️', 2:'⛅', 3:'☁️', 45:'🌫️', 48:'🌫️',
  51:'🌦️', 53:'🌦️', 55:'🌧️', 61:'🌧️', 63:'🌧️', 65:'🌧️',
  71:'🌨️', 73:'❄️', 75:'❄️', 80:'🌦️', 81:'🌧️', 82:'⛈️',
  95:'⛈️', 96:'⛈️'
};

async function fetchWeather() {
  try {
    const url = 'https://api.open-meteo.com/v1/forecast?latitude=44.4949&longitude=11.3426&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,weather_code,uv_index&wind_speed_unit=kmh';
    const res = await fetch(url);
    const data = await res.json();
    const c = data.current;
    const code = c.weather_code;
    document.getElementById('weather-temp').textContent = Math.round(c.temperature_2m) + '°';
    document.getElementById('weather-desc').textContent = WMO_CODES[code] || 'N/D';
    document.getElementById('weather-icon').textContent = WMO_ICONS[code] || '🌡️';
    document.getElementById('w-feels').textContent = Math.round(c.apparent_temperature) + '°';
    document.getElementById('w-hum').textContent = Math.round(c.relative_humidity_2m) + '%';
    document.getElementById('w-wind').textContent = Math.round(c.wind_speed_10m) + ' km/h';
    document.getElementById('w-uv').textContent = c.uv_index !== undefined ? Math.round(c.uv_index) : '—';
  } catch(e) {
    document.getElementById('weather-desc').textContent = 'Non disponibile';
  }
}
fetchWeather();
setInterval(fetchWeather, 10 * 60 * 1000);

// ──────────────────────────────────────────
// NOTION TASKS via Cloudflare Worker
// ──────────────────────────────────────────
let tasks = [];
let syncInterval = null;

function statusKey(s) {
  if (!s) return 'todo';
  const v = s.toLowerCase().replace(/\s/g,'');
  if (v.includes('progress') || v.includes('doing')) return 'inprogress';
  if (v.includes('done') || v.includes('complete')) return 'done';
  return 'todo';
}

function dueLabel(dateStr) {
  if (!dateStr) return null;
  const due = new Date(dateStr);
  const now = new Date();
  const diffDays = Math.floor((due - now) / 86400000);
  if (diffDays < 1) return { text: 'Scaduta', cls: 'overdue' };
  if (diffDays === 1) return { text: 'Oggi', cls: 'today' };
  if (diffDays <= 3) return { text: `Fra ${diffDays}g`, cls: 'soon' };
  return { text: due.toLocaleDateString('it-IT', { day:'numeric', month:'short' }), cls: '' };
}

function renderTasks(list) {
  const container = document.getElementById('tasks-list');
  const empty = document.getElementById('tasks-empty');
  container.innerHTML = '';
  container.appendChild(empty);

  if (!list || list.length === 0) {
    empty.style.display = 'flex';
    document.getElementById('task-count').textContent = '0 tasks';
    updateStats([]);
    return;
  }
  empty.style.display = 'none';

  const sorted = [...list].sort((a, b) => {
    const da = a.due ? new Date(a.due) : new Date('9999');
    const db = b.due ? new Date(b.due) : new Date('9999');
    return da - db;
  });

  document.getElementById('task-count').textContent = sorted.length + ' tasks';
  updateStats(sorted);

  sorted.forEach((task, i) => {
    const sk = statusKey(task.status);
    const card = document.createElement('div');
    card.className = 'task-card';
    card.style.animationDelay = (i * 40) + 'ms';

    const dotCls = sk === 'inprogress' ? 'status-inprogress' : sk === 'done' ? 'status-done' : 'status-todo';
    const nameCls = sk === 'done' ? 'done-task' : '';

    const tags = (task.tags || []).map(t =>
      `<span class="tag">${escHtml(t)}</span>`
    ).join('');

    const due = task.due ? dueLabel(task.due) : null;
    const dueHtml = due ? `<span class="due-date ${due.cls}">⏱ ${due.text}</span>` : '';

    card.innerHTML = `
      <span class="status-dot ${dotCls}"></span>
      <div class="task-body">
        <div class="task-name ${nameCls}">${escHtml(task.name)}</div>
        <div class="task-meta">${tags}${dueHtml}</div>
      </div>
    `;
    container.appendChild(card);
  });
}

function updateStats(list) {
  const total = list.length;
  const ip    = list.filter(t => statusKey(t.status) === 'inprogress').length;
  const todo  = list.filter(t => statusKey(t.status) === 'todo').length;
  const done  = list.filter(t => statusKey(t.status) === 'done').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-inprogress').textContent = ip;
  document.getElementById('stat-todo').textContent = todo;
  document.getElementById('stat-done').textContent = done;
}

function escHtml(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function setSyncStatus(ok, msg) {
  document.getElementById('sync-dot').style.background = ok ? 'var(--accent)' : 'var(--danger)';
  document.getElementById('sync-text').textContent = msg;
}

async function fetchTasks() {
  const url = CFG.workerUrl;
  if (!url) {
    renderTasks(getDemoTasks());
    setSyncStatus(false, 'Demo mode');
    return;
  }
  try {
    setSyncStatus(true, 'Syncing…');
    const res = await fetch(url);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    tasks = data.tasks || [];
    renderTasks(tasks);
    setSyncStatus(true, 'Live · ' + new Date().toLocaleTimeString('it-IT', {hour:'2-digit',minute:'2-digit'}));
    document.getElementById('error-banner').style.display = 'none';
  } catch(e) {
    setSyncStatus(false, 'Error');
    document.getElementById('error-banner').style.display = 'block';
    document.getElementById('error-banner').textContent = '⚠ Could not reach worker: ' + e.message + '. Check your Worker URL in settings.';
    if (tasks.length === 0) renderTasks(getDemoTasks());
  }
}

function startSync() {
  if (syncInterval) clearInterval(syncInterval);
  fetchTasks();
  syncInterval = setInterval(fetchTasks, 30000);
}

function getDemoTasks() {
  const today = new Date();
  const d = (offset) => {
    const x = new Date(today);
    x.setDate(x.getDate() + offset);
    return x.toISOString().split('T')[0];
  };
  return [
    { name: 'Configure Cloudflare Worker', status: 'In progress', due: d(0), tags: ['Setup'] },
    { name: 'Connect Notion database', status: 'To Do', due: d(1), tags: ['Setup'] },
    { name: 'Deploy to GitHub Pages', status: 'To Do', due: d(3), tags: ['Deploy'] },
    { name: 'Design dashboard layout', status: 'Done', due: d(-2), tags: ['Design'] },
    { name: 'Test on Firestick', status: 'To Do', due: d(5), tags: ['QA'] },
    { name: 'Add weather widget', status: 'Done', due: d(-1), tags: ['Feature'] },
  ];
}

// ──────────────────────────────────────────
// SETTINGS UI
// ──────────────────────────────────────────
function openSettings() {
  document.getElementById('cfg-worker-url').value = CFG.workerUrl;
  document.getElementById('cfg-bg').value = CFG.bg;
  document.getElementById('cfg-surface').value = CFG.surface;
  document.getElementById('cfg-text').value = CFG.text;
  document.getElementById('cfg-accent').value = CFG.accent;
  document.getElementById('cfg-font').value = CFG.font;
  document.getElementById('cfg-task-size').value = CFG.taskSize;
  document.getElementById('task-size-val').textContent = CFG.taskSize + 'px';
  document.getElementById('cfg-clock-size').value = CFG.clockSize;
  document.getElementById('clock-size-val').textContent = CFG.clockSize + 'px';
  document.getElementById('cfg-rpanel').value = CFG.rpanel;
  document.getElementById('rpanel-val').textContent = CFG.rpanel + 'px';
  document.getElementById('cfg-title').value = CFG.title;
  document.getElementById('settings-overlay').classList.add('open');
}

function closeSettings() {
  document.getElementById('settings-overlay').classList.remove('open');
}

function saveSettings() {
  CFG = {
    workerUrl: document.getElementById('cfg-worker-url').value.trim(),
    bg:        document.getElementById('cfg-bg').value,
    surface:   document.getElementById('cfg-surface').value,
    text:      document.getElementById('cfg-text').value,
    accent:    document.getElementById('cfg-accent').value,
    font:      document.getElementById('cfg-font').value,
    taskSize:  parseInt(document.getElementById('cfg-task-size').value),
    clockSize: parseInt(document.getElementById('cfg-clock-size').value),
    rpanel:    parseInt(document.getElementById('cfg-rpanel').value),
    title:     document.getElementById('cfg-title').value || 'My Dashboard',
  };
  saveConfig(CFG);
  applyConfig(CFG);
  closeSettings();
  startSync();
}

// ──────────────────────────────────────────
// INIT
// ──────────────────────────────────────────
applyConfig(CFG);
startSync();
</script>
